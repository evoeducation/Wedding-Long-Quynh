<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Thiệp Cưới | Tuấn Long & Hương Quỳnh</tit  le>

<!-- Fonts: Dancing Script (giống ảnh mẫu) + Playfair Display + Be Vietnam Pro -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
/* ══ VARIABLES ══════════════════════════════════ */
:root{
  --red:       #b02020;
  --red2:      #d43a3a;
  --red-pale:  #fdf2f2;
  --red-muted: #f0c8c8;
  --cream:     #fef9f7;
  --gold:      #c9a060;
  --gold-lt:   #e8d5a3;
  --text-dark: #2a0e0e;
  --text-mid:  #7a3030;
  --text-soft: #b07070;
  --shadow:    rgba(176,32,32,.13);
  --green:     #3d6b45; /* accent từ ảnh mẫu */
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-snap-type:y mandatory;overflow-y:scroll;scroll-behavior:smooth}
body{font-family:'Be Vietnam Pro',sans-serif;font-weight:300;overflow-x:hidden;background:var(--cream)}

/* ══ FONT SHORTHAND ════════════════════════════ */
.f-script  {font-family:'Dancing Script',cursive}
.f-serif   {font-family:'Playfair Display',serif}
.f-body    {font-family:'Be Vietnam Pro',sans-serif}

/* ══ PAGES ═════════════════════════════════════ */
.page{
  height:100dvh;min-height:100dvh;
  scroll-snap-align:start;scroll-snap-stop:always;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  padding:clamp(16px,4vw,28px) clamp(12px,4vw,20px);
}
/* Các trang có nhiều nội dung cho phép scroll bên trong */
#p4,#p5,#p7{overflow-y:auto;justify-content:flex-start;padding-top:clamp(24px,5vw,40px)}

/* ══ PARTICLES ══════════════════════════════════ */
#pcv{position:fixed;inset:0;pointer-events:none;z-index:0}

/* ══ NAV DOTS ═══════════════════════════════════ */
.ndots{
  position:fixed;right:13px;top:50%;transform:translateY(-50%);
  z-index:300;display:flex;flex-direction:column;gap:8px;
}
.ndot{
  width:7px;height:7px;border-radius:50%;
  background:var(--red-muted);border:1.5px solid var(--red);
  cursor:pointer;transition:all .3s;
}
.ndot.on{background:var(--red);transform:scale(1.55)}
@media(max-width:480px){.ndots{display:none}}

/* ══ MUSIC PANEL ════════════════════════════════ */
/* YouTube iframe ẩn hoàn toàn — chỉ âm thanh */
#yt-frame{
  position:fixed;width:1px;height:1px;
  left:-9999px;top:-9999px;opacity:0;pointer-events:none;
}
#music-btn{
  position:fixed;bottom:20px;left:16px;
  width:44px;height:44px;border-radius:50%;
  background:var(--red);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:300;box-shadow:0 3px 16px var(--shadow);
  transition:transform .3s,background .3s;
}
#music-btn:hover{transform:scale(1.12);background:var(--red2)}
.mwave{display:flex;gap:2px;align-items:flex-end}
.mwave span{width:3px;background:#fff;border-radius:2px;animation:wv .8s ease-in-out infinite alternate}
.mwave span:nth-child(1){height:8px;animation-delay:0s}
.mwave span:nth-child(2){height:14px;animation-delay:.15s}
.mwave span:nth-child(3){height:10px;animation-delay:.3s}
.mwave span:nth-child(4){height:6px;animation-delay:.45s}
.mwave.paused span{animation-play-state:paused;height:4px!important}
@keyframes wv{from{transform:scaleY(1)}to{transform:scaleY(.3)}}

/* ══ PAGE INDICATOR ═════════════════════════════ */
.pnum{
  position:sticky;bottom:4px;left:50%;transform:translateX(-50%);
  font-size:9px;letter-spacing:3px;opacity:.5;
  margin-top:auto;padding-top:6px;display:block;text-align:center;
}

/* ══ REVEAL ═════════════════════════════════════ */
.rv{opacity:0;transform:translateY(22px);transition:opacity .7s,transform .7s}
.rv.on{opacity:1;transform:translateY(0)}

/* ══ SHARED COMPONENTS ══════════════════════════ */
.badge{
  display:inline-block;font-size:10px;font-weight:500;letter-spacing:3px;text-transform:uppercase;
  color:var(--red);border:1px solid var(--red-muted);padding:5px 18px;border-radius:20px;
  background:rgba(255,255,255,.75);backdrop-filter:blur(6px);
}
.divline{
  display:flex;align-items:center;gap:12px;margin:0 auto;max-width:240px;
}
.divline::before,.divline::after{content:'';flex:1;height:1px}
.divline.red::before,.divline.red::after{background:linear-gradient(to right,transparent,var(--red-muted))}
.divline.red::after{background:linear-gradient(to left,transparent,var(--red-muted))}
.divline span{color:var(--red);font-size:15px}
.sec-lbl{font-size:9px;letter-spacing:5px;text-transform:uppercase;margin-bottom:8px}
.sec-title{font-family:'Dancing Script',cursive;font-size:clamp(30px,8vw,56px)}

/* ══════════════════════════════════════════════
   TRANG 1 — HERO
══════════════════════════════════════════════ */
#p1{
  background:
    radial-gradient(ellipse at 65% 25%,rgba(176,32,32,.14) 0%,transparent 55%),
    radial-gradient(ellipse at 15% 75%,rgba(201,160,96,.13) 0%,transparent 50%),
    var(--cream);
  text-align:center;z-index:1;
}
/* Watercolor blob giả — giống ảnh mẫu */
#p1::before{
  content:'';
  position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);
  width:min(520px,90vw);height:min(320px,55vw);
  background:radial-gradient(ellipse at 50% 45%,rgba(176,32,32,.09) 0%,rgba(176,32,32,.04) 50%,transparent 75%);
  border-radius:60% 40% 55% 45%/50% 60% 40% 50%;
  pointer-events:none;
}
.hero-kính-mời{margin-bottom:20px}
.hero-names{
  font-family:'Dancing Script',cursive;
  font-size:clamp(52px,14vw,108px);
  line-height:1.05;color:var(--text-dark);
  text-shadow:0 2px 20px rgba(176,32,32,.12);
}
.hero-amp{display:block;font-size:clamp(36px,9vw,70px);color:var(--red);margin:-8px 0}
.hero-date{
  margin-top:22px;
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(14px,3.2vw,20px);letter-spacing:3px;color:var(--text-mid);
}
.hero-scroll{
  margin-top:36px;display:flex;flex-direction:column;align-items:center;gap:5px;
  color:var(--red);font-size:9px;letter-spacing:3px;text-transform:uppercase;
  animation:bob 2s infinite;opacity:.65;
}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}

/* ══════════════════════════════════════════════
   TRANG 2 — LỜI NGỎ
══════════════════════════════════════════════ */
#p2{background:var(--red-pale);text-align:center;z-index:1}
.p2-wrap{max-width:580px}
.p2-quote{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(17px,3.8vw,24px);color:var(--text-mid);line-height:1.85;margin:16px 0;
}
.p2-body{font-size:13px;line-height:2;color:var(--text-soft);margin-top:16px}

/* ══════════════════════════════════════════════
   TRANG 3 — ĐỒNG HỒ ĐẾM NGƯỢC
══════════════════════════════════════════════ */
#p3{
  background:linear-gradient(145deg,#180606 0%,#5c1010 50%,#280808 100%);
  text-align:center;z-index:1;
}
#p3::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(176,32,32,.22) 0%,transparent 65%)}
.cd-lbl{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--red-muted);margin-bottom:8px;position:relative}
.cd-title{font-family:'Dancing Script',cursive;font-size:clamp(30px,8vw,54px);color:var(--gold-lt);margin-bottom:36px;position:relative}
.cd-grid{display:flex;justify-content:center;gap:clamp(10px,3.5vw,26px);flex-wrap:wrap;position:relative}
.cd-item{display:flex;flex-direction:column;align-items:center;gap:7px}
.cd-num{
  width:clamp(64px,16vw,94px);height:clamp(64px,16vw,94px);
  background:rgba(255,255,255,.06);border:1px solid rgba(176,32,32,.5);
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:clamp(26px,7vw,46px);
  color:var(--gold-lt);letter-spacing:-2px;backdrop-filter:blur(8px);
  transition:transform .3s;
}
.cd-num:hover{transform:translateY(-4px)}
.cd-unit{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--red-muted)}

/* ══════════════════════════════════════════════
   TRANG 4 — THÔNG TIN LỄ CƯỚI
══════════════════════════════════════════════ */
#p4{background:var(--cream);z-index:1}
#p4 .sec-lbl{color:var(--red)}
#p4 .sec-title{color:var(--text-dark)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:760px;margin-top:20px}
@media(max-width:560px){.info-grid{grid-template-columns:1fr;gap:12px}}
.icard{
  background:#fff;border:1px solid var(--red-muted);border-radius:18px;
  padding:22px 18px;text-align:center;box-shadow:0 6px 28px var(--shadow);
  position:relative;overflow:hidden;
}
.icard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red-muted),var(--red),var(--red-muted))}
.icard-side{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--red);margin-bottom:10px}
.icard-fam{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:12px;color:var(--text-soft);line-height:1.9;margin-bottom:12px;
}
.icard-bar{width:30px;height:1px;background:var(--red-muted);margin:10px auto}
.icard-time{font-family:'Dancing Script',cursive;font-size:28px;color:var(--red);margin-bottom:2px}
.icard-dstr{font-size:10px;letter-spacing:2px;color:var(--text-soft);margin-bottom:10px}
.icard-venue{font-size:13px;font-weight:500;color:var(--text-dark);margin-bottom:3px}
.icard-addr{font-size:11px;color:var(--text-soft);line-height:1.65}
  /* Ảnh chân dung trong card */
.icard-avatar{width:300px;height:300px;border-radius:50%;object-fit:cover;border:2px solid var(--red-muted);margin:8px auto 4px;display:block}
.icard-avatar-name{font-family:'Dancing Script',cursive;font-size:16px;color:var(--text-mid);margin-bottom:6px}

/* ══════════════════════════════════════════════
   TRANG 5 — BẢN ĐỒ
══════════════════════════════════════════════ */
#p5{background:var(--red-pale);z-index:1}
#p5 .sec-lbl{color:var(--red)}
#p5 .sec-title{color:var(--text-dark)}
.maps-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:760px;margin-top:20px}
@media(max-width:560px){.maps-grid{grid-template-columns:1fr;gap:12px}}
.mcard{background:#fff;border:1px solid var(--red-muted);border-radius:14px;overflow:hidden;box-shadow:0 5px 22px var(--shadow)}
.mcard-head{padding:11px 16px 9px;background:linear-gradient(135deg,#fff8f7,#fdeaea);border-bottom:1px solid var(--red-muted)}
.mcard-head h3{font-family:'Dancing Script',cursive;font-size:22px;color:var(--text-dark);margin-bottom:1px}
.mcard-head p{font-size:10px;color:var(--text-soft)}
.mcard iframe{width:100%;height:150px;border:none;display:block}
.mcard-btn{
  display:block;margin:10px 12px 12px;padding:9px;
  background:linear-gradient(135deg,var(--red),var(--red2));
  color:#fff;border-radius:8px;text-decoration:none;
  font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  text-align:center;transition:opacity .3s,transform .2s;
}
.mcard-btn:hover{opacity:.85;transform:translateY(-1px)}

/* ══════════════════════════════════════════════
   TRANG 6 — ALBUM ẢNH
══════════════════════════════════════════════ */
#p6{background:var(--cream);z-index:1}
#p6 .sec-lbl{color:var(--red)}
#p6 .sec-title{color:var(--text-dark)}
.ggrid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:8px;width:100%;max-width:680px;margin-top:14px;
}
@media(max-width:480px){.ggrid{grid-template-columns:repeat(2,1fr);gap:5px}}
/* Tất cả ô đều vuông — tránh ảnh dọc bị cắt xấu */
.gi{border-radius:8px;overflow:hidden;cursor:pointer;position:relative;aspect-ratio:1/1;background:var(--red-muted)}
.gi img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;transition:transform .5s}
.gi:hover img{transform:scale(1.07)}
.gi-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(80,10,10,.5),transparent);opacity:0;transition:opacity .3s;display:flex;align-items:flex-end;padding:8px}
.gi:hover .gi-ov{opacity:1}
.gi-ov span{color:#fff;font-size:10px;letter-spacing:2px}

/* Lightbox */
#lb{display:none;position:fixed;inset:0;background:rgba(12,2,2,.93);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
#lb.open{display:flex}
#lb img{max-width:90vw;max-height:88vh;border-radius:10px}
#lb-x{position:absolute;top:16px;right:20px;color:#fff;font-size:30px;cursor:pointer;background:none;border:none;opacity:.8}
#lb-x:hover{opacity:1}

/* ══════════════════════════════════════════════
   TRANG 7 — MỪNG CƯỚI / QR
══════════════════════════════════════════════ */
#p7{background:var(--red-pale);text-align:center;z-index:1}
#p7 .sec-lbl{color:var(--red)}
#p7 .sec-title{color:var(--text-dark)}
.qr-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:680px;margin-top:20px}
@media(max-width:540px){.qr-grid{grid-template-columns:1fr;gap:12px}}
.qcard{
  background:#fff;border:1px solid var(--red-muted);border-radius:18px;
  padding:24px 18px;box-shadow:0 8px 32px var(--shadow);text-align:center;
}
.qcard-who{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--red);margin-bottom:12px}
.qcard-qr{
  width:130px;height:130px;background:var(--red-pale);border:2px dashed var(--red-muted);
  border-radius:10px;margin:0 auto 14px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;color:var(--red2);font-size:10px;
  text-align:center;padding:10px;
}
/* Khi có QR thật: thay .qcard-qr bằng <img src="qr.png" .../> */
.qcard-bank{font-family:'Playfair Display',serif;font-size:13px;color:var(--text-mid);line-height:1.9}
.qcard-bank strong{display:block;font-family:'Be Vietnam Pro',sans-serif;font-size:17px;letter-spacing:2px;color:var(--text-dark);margin:5px 0}
.qcard-bank em{font-size:11px;font-style:normal;color:var(--text-soft)}

/* ══════════════════════════════════════════════
   TRANG 8 — RSVP
══════════════════════════════════════════════ */
#p8{
  background:linear-gradient(150deg,#180606 0%,#4a1010 60%,#280808 100%);
  z-index:1;
}
#p8::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(176,32,32,.18) 0%,transparent 58%)}
#p8 .sec-lbl{color:var(--red-muted)}
#p8 .sec-title{color:var(--gold-lt)}
.rform{
  background:rgba(255,255,255,.05);border:1px solid rgba(176,32,32,.28);
  border-radius:20px;padding:24px 22px;
  backdrop-filter:blur(12px);max-width:460px;width:100%;
  overflow-y:auto;max-height:calc(100dvh - 170px);
}
@media(max-width:480px){.rform{padding:18px 14px}}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--red-muted);margin-bottom:6px}
.fg input,.fg select,.fg textarea{
  width:100%;padding:11px 14px;
  background:rgba(255,255,255,.08);border:1px solid rgba(176,32,32,.3);
  border-radius:9px;color:#fff;
  font-family:'Be Vietnam Pro',sans-serif;font-size:13px;font-weight:300;
  outline:none;transition:border-color .3s,background .3s;
}
.fg select option{background:#280808;color:#fff}
.fg input::placeholder,.fg textarea::placeholder{color:rgba(255,255,255,.3)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--red);background:rgba(255,255,255,.12)}
.fg textarea{height:72px;resize:none}
.rg{display:flex;gap:8px;flex-wrap:wrap}
.rl{
  display:flex;align-items:center;gap:6px;cursor:pointer;
  font-size:12px;color:rgba(255,255,255,.7);
  padding:8px 13px;border:1px solid rgba(176,32,32,.3);
  border-radius:7px;transition:all .3s;
}
.rl input{display:none}
.rl.sel{background:rgba(176,32,32,.22);border-color:var(--red);color:var(--red-muted)}
.rdot{width:12px;height:12px;border:2px solid var(--red);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.rl.sel .rdot::after{content:'';width:5px;height:5px;background:var(--red);border-radius:50%}
.sbtn{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--red) 0%,var(--red2) 50%,var(--red) 100%);
  background-size:200% 100%;
  color:#fff;border:none;border-radius:10px;
  font-family:'Be Vietnam Pro',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:4px;text-transform:uppercase;cursor:pointer;margin-top:4px;
  transition:background-position .4s,transform .2s,box-shadow .3s;
  box-shadow:0 4px 18px rgba(176,32,32,.4);
}
.sbtn:hover{background-position:right;transform:translateY(-2px)}
.ty{display:none;text-align:center;padding:28px 0}
.ty.show{display:block}
.ty-ico{font-size:48px;margin-bottom:12px}
.ty h3{font-family:'Dancing Script',cursive;font-size:38px;color:var(--gold-lt);margin-bottom:10px}
.ty p{font-size:13px;color:rgba(255,255,255,.55);line-height:1.8}

/* Footer nhỏ trong p8 */
.foot{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  text-align:center;
}
.foot-name{font-family:'Dancing Script',cursive;font-size:22px;color:var(--gold);line-height:1.2;white-space:nowrap}
.foot p{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.28);margin-top:2px}
</style>
</head>
<body>

<!-- Particles canvas -->
<canvas id="pcv"></canvas>

<!-- YouTube audio (ẩn) -->
<iframe id="yt-frame"
  src="https://www.youtube.com/embed/06-XXOTP3Gc?autoplay=0&loop=1&playlist=06-XXOTP3Gc&enablejsapi=1"
  allow="autoplay; encrypted-media"
  allowfullscreen>
</iframe>

<!-- Music button -->
<button id="music-btn" title="Bật/tắt nhạc">
  <div class="mwave paused"><span></span><span></span><span></span><span></span></div>
</button>

<!-- Nav dots -->
<nav class="ndots">
  <div class="ndot on"  data-p="p1" title="Trang chủ"></div>
  <div class="ndot"     data-p="p2" title="Lời ngỏ"></div>
  <div class="ndot"     data-p="p3" title="Đếm ngược"></div>
  <div class="ndot"     data-p="p4" title="Lễ cưới"></div>
  <div class="ndot"     data-p="p5" title="Bản đồ"></div>
  <div class="ndot"     data-p="p6" title="Album ảnh"></div>
  <div class="ndot"     data-p="p7" title="Mừng cưới"></div>
  <div class="ndot"     data-p="p8" title="Xác nhận"></div>
</nav>

<!-- ══ TRANG 1 ── HERO ══════════════════════════ -->
<section class="page" id="p1">
  <div class="badge hero-kính-mời">♥ Trân trọng kính mời ♥</div>
  <h1 class="hero-names">
    Tuấn Long
    <span class="hero-amp">&amp;</span>
    Hương Quỳnh
  </h1>
  <p class="hero-date">Thứ Hai · 18 · 05 · 2026 · Hưng Yên</p>
  <div class="hero-scroll">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
    Vuốt xuống
  </div>
  <span class="pnum" style="color:var(--text-soft)">01 / 08</span>
</section>

<!-- ══ TRANG 2 ── LỜI NGỎ ═══════════════════════ -->
<section class="page" id="p2">
  <div class="p2-wrap rv" style="text-align:center">

<!-- ══ JAVASCRIPT ═══════════════════════════════ -->
<script>
/* ── 1. PARTICLES ───────────────────────────── */
(()=>{
  const cv=document.getElementById('pcv'),cx=cv.getContext('2d');let ps=[];
  const SYM=['♥','✿','❀','❋'],COL=['rgba(176,32,32,.45)','rgba(220,80,80,.4)','rgba(201,160,96,.4)','rgba(240,140,120,.4)'];
  const rz=()=>{cv.width=innerWidth;cv.height=innerHeight};rz();window.addEventListener('resize',rz);
  const sp=()=>{const s=10+Math.random()*13;return{x:Math.random()*cv.width,y:-30,size:s,vx:(Math.random()-.5)*.6,vy:.5+Math.random()*.8,rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.04,sym:SYM[Math.random()*4|0],col:COL[Math.random()*4|0],a:.6+Math.random()*.4}};
  for(let i=0;i<16;i++){const p=sp();p.y=Math.random()*innerHeight;ps.push(p);}
  const dr=()=>{cx.clearRect(0,0,cv.width,cv.height);if(Math.random()<.025)ps.push(sp());ps=ps.filter(p=>p.y<cv.height+40);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.rs;cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);cx.globalAlpha=p.a;cx.font=p.size+'px serif';cx.fillStyle=p.col;cx.textAlign='center';cx.textBaseline='middle';cx.fillText(p.sym,0,0);cx.restore();});requestAnimationFrame(dr);};dr();
})();

/* ── 2. COUNTDOWN ── 💡 Đổi ngày tại đây ───── */
const WD=new Date('2026-05-18T09:00:00');
const tick=()=>{
  const d=WD-new Date();
  if(d<=0){['days','hours','minutes','seconds'].forEach(k=>document.getElementById('cd-'+k).textContent='00');return;}
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('cd-days').textContent   =p(Math.floor(d/864e5));
  document.getElementById('cd-hours').textContent  =p(Math.floor(d%864e5/36e5));
  document.getElementById('cd-minutes').textContent=p(Math.floor(d%36e5/6e4));
  document.getElementById('cd-seconds').textContent=p(Math.floor(d%6e4/1e3));
};tick();setInterval(tick,1000);

/* ── 3. SCROLL REVEAL ───────────────────────── */
const ro=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('on')}),{threshold:.1});
document.querySelectorAll('.rv').forEach(el=>ro.observe(el));

/* ── 4. NAV DOTS ────────────────────────────── */
const PGS=['p1','p2','p3','p4','p5','p6','p7','p8'];
const dots=document.querySelectorAll('.ndot');
dots.forEach((d,i)=>d.addEventListener('click',()=>document.getElementById(PGS[i]).scrollIntoView({behavior:'smooth'})));
const so=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){const i=PGS.indexOf(e.target.id);if(i>-1){dots.forEach(d=>d.classList.remove('on'));dots[i].classList.add('on');}}}),{threshold:.5});
PGS.forEach(id=>{const el=document.getElementById(id);if(el)so.observe(el);});

/* ── 5. LIGHTBOX ────────────────────────────── */
function openLB(el){document.getElementById('lb-img').src=el.querySelector('img').src;document.getElementById('lb').classList.add('open');document.body.style.overflow='hidden';}
function closeLB(){document.getElementById('lb').classList.remove('open');document.body.style.overflow='';}
document.getElementById('lb').addEventListener('click',function(e){if(e.target===this)closeLB();});

/* ── 6. RSVP ────────────────────────────────── */
let side='';
function pickSide(el,v){document.querySelectorAll('.rl').forEach(l=>l.classList.remove('sel'));el.classList.add('sel');side=v;}
function sendRSVP(){
  const name=document.getElementById('r-name').value.trim();
  const guests=document.getElementById('r-guests').value;
  if(!name){alert('Vui lòng nhập họ và tên.');return;}
  if(!side){alert('Vui lòng chọn bạn là khách của ai.');return;}
  if(!guests){alert('Vui lòng chọn số người.');return;}
  // 💡 Kết nối Google Sheets tại đây nếu cần
  document.getElementById('rsvp-fields').style.display='none';
  document.getElementById('ty-msg').classList.add('show');
}

/* ── 7. YOUTUBE AUDIO PLAYER ────────────────── */
/*
  YouTube không cho phép autoplay nếu người dùng chưa tương tác.
  Giải pháp: nhấn nút ♪ để bật, iframe sẽ play bài hát.
  Dùng YouTube IFrame API để điều khiển play/pause.
*/
let ytPlayer=null;let ytReady=false;let wantPlay=false;

// Load YouTube IFrame API
const tag=document.createElement('script');
tag.src='https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

window.onYouTubeIframeAPIReady=function(){
  ytPlayer=new YT.Player('yt-frame',{
    events:{
      onReady:()=>{ytReady=true;ytPlayer.playVideo();playing=true;mwave.classList.remove('paused');},
      onStateChange:(e)=>{
        // Khi video kết thúc, phát lại (loop thủ công)
        if(e.data===YT.PlayerState.ENDED)ytPlayer.playVideo();
      }
    }
  });
};

const mbtn=document.getElementById('music-btn');
const mwave=mbtn.querySelector('.mwave');
let playing=false;

mbtn.addEventListener('click',()=>{
  if(!ytReady){
    wantPlay=true;
    // Thử kích hoạt lần đầu bằng cách load lại src với autoplay
    mwave.classList.remove('paused');
    playing=true;
    return;
  }
  if(playing){
    ytPlayer.pauseVideo();
    playing=false;
    mwave.classList.add('paused');
  }else{
    ytPlayer.playVideo();
    playing=true;
    mwave.classList.remove('paused');
  }
});
</script>
